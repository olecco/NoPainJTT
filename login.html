<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>No Pain JTT</title>
    <style>
      :root {
        color-scheme: light dark;
      }
      body {
        font: 14px system-ui, -apple-system, Segoe UI, Roboto, Arial, sans-serif;
        margin: 24px;
      }
      .card {
        max-width: 420px;
      }
      label {
        display: block;
        margin-top: 14px;
        font-weight: 600;
      }
      input {
        width: 100%;
        box-sizing: border-box;
        padding: 10px 12px;
        margin-top: 8px;
      }
      #titleRow {
        display: flex;
        align-items: center;
        justify-content: space-between;
        gap: 12px;
        margin-bottom: 6px;
      }
      #titleRow h2 {
        margin: 0;
      }
      #logout {
        width: auto;
        margin: 0;
        padding: 6px 10px;
      }
      button {
        width: 100%;
        padding: 10px 12px;
        margin-top: 18px;
        cursor: pointer;
      }
      #status {
        margin-top: 12px;
        opacity: 0.85;
        word-break: break-word;
      }
      #resultsWrap {
        margin-top: 16px;
      }
      #calendarHeader {
        display: flex;
        align-items: center;
        justify-content: space-between;
        gap: 10px;
        margin-bottom: 10px;
      }
      #monthLabel {
        font-weight: 700;
      }
      .navBtn {
        padding: 6px 10px;
        width: auto;
        margin: 0;
      }
      #calendar {
        max-height: 280px;
        overflow: auto;
        border: 1px solid color-mix(in srgb, currentColor 25%, transparent);
        border-radius: 8px;
        padding: 10px 12px;
      }
      #dow {
        display: grid;
        grid-template-columns: repeat(7, 1fr);
        gap: 6px;
        font-size: 12px;
        opacity: 0.75;
        margin-bottom: 8px;
      }
      #grid {
        display: grid;
        grid-template-columns: repeat(7, 1fr);
        gap: 6px;
      }
      .day {
        border: 1px solid color-mix(in srgb, currentColor 18%, transparent);
        border-radius: 8px;
        padding: 8px 0;
        text-align: center;
        user-select: none;
        cursor: default;
      }
      .day.muted {
        opacity: 0.35;
      }
      .day.mutedPrev {
        opacity: 0.35;
      }
      .day.closedWeek {
        opacity: 0.35;
        background: color-mix(in srgb, currentColor 4%, transparent);
      }
      .day.hasWorklog {
        background: color-mix(in srgb, #2b7cff 25%, transparent);
        border-color: color-mix(in srgb, #2b7cff 55%, transparent);
        font-weight: 700;
      }
      .day.today {
        outline: 2px solid color-mix(in srgb, #ff7a00 70%, transparent);
        outline-offset: 1px;
      }
      .day.pressed {
        background: color-mix(in srgb, currentColor 8%, transparent);
      }
      .day.disabled {
        opacity: 0.35;
      }
      .day.weekend {
        opacity: 0.35;
        background: color-mix(in srgb, currentColor 4%, transparent);
        pointer-events: none;
      }
    </style>
  </head>
  <body>
    <div class="card">
      <div id="titleRow">
        <h2>No Pain JTT</h2>
        <button id="logout" type="button" disabled>Logout</button>
      </div>

      <label for="name">Name</label>
      <input id="name" type="text" autocomplete="username" />

      <label for="password">Password</label>
      <input id="password" type="password" autocomplete="current-password" />

      <button id="login" type="button">Login to JTT</button>
      <div id="status" aria-live="polite"></div>

      <div id="resultsWrap">
        <div id="calendarHeader">
          <button id="prevMonth" class="navBtn" type="button" aria-label="Previous month">
            ◀
          </button>
          <div id="monthLabel">—</div>
          <button id="nextMonth" class="navBtn" type="button" aria-label="Next month">
            ▶
          </button>
        </div>
        <div id="calendar" aria-label="Worklog calendar">
          <div id="dow">
            <div>Mon</div><div>Tue</div><div>Wed</div><div>Thu</div><div>Fri</div><div>Sat</div><div>Sun</div>
          </div>
          <div id="grid"></div>
        </div>
      </div>
    </div>

    <script src="login.js"></script>
  </body>
</html>
